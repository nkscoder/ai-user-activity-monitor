# Python package CI — build wheel/sdist and run tests
# https://github.com/nkscoder/ai-user-activity-monitor

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          pip install build pytest-django
          pip install -e .

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel installs
        run: pip install dist/*.whl

      - name: Run tests
        run: pytest
