# Python package CI using Conda
# https://github.com/nkscoder/ai-user-activity-monitor

name: Python Package using Conda

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,defaults

      - name: Install dependencies (conda + pip)
        shell: bash -l {0}
        run: |
          conda install -y pip django openpyxl pytest pytest-django
          pip install -e .

      - name: Run migrations
        shell: bash -l {0}
        run: python -m django migrate --settings=tests.settings

      - name: Run tests
        shell: bash -l {0}
        run: pytest
